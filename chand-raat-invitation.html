<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chand Raat – You're Invited</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Nastaliq+Urdu:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: radial-gradient(circle at 50% 50%, #2a040c 0%, #120104 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  overflow: hidden;
}

.stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.star {
  position: absolute;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
}
@keyframes twinkle {
  0%,100% { opacity: var(--lo, 0.1); }
  50%      { opacity: var(--hi, 0.6); }
}

#scene {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ══ ENVELOPE ══ */
#envelope-wrap {
  position: relative;
  width: 380px;
  height: 260px;
  cursor: pointer;
  transition: transform 0.3s ease;
}
#envelope-wrap:hover { transform: scale(1.02); }

.env-back {
  position: absolute; inset: 0;
  background: #3d0a14;
  border-radius: 2px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.8);
}

/* diagonal stripe texture */
.env-back::after {
  content:'';
  position:absolute; inset:0;
  background-image: repeating-linear-gradient(
    45deg, transparent, transparent 5px,
    rgba(255,255,255,0.018) 5px, rgba(255,255,255,0.018) 6px
  );
  border-radius:2px;
}

/* gold border on envelope body */
.env-border {
  position:absolute; inset:7px;
  border: 1px solid rgba(201,146,34,0.25);
  border-radius:1px;
  pointer-events:none;
  z-index:6;
}

.env-left {
  position: absolute; top:0; left:0;
  width:55%; height:100%;
  clip-path: polygon(0 0, 100% 50%, 0 100%);
  background: linear-gradient(to right, #500f1c, #430b16);

  box-shadow: 2px 0 10px rgba(0,0,0,0.5);
}
.env-right {
  position: absolute; top:0; right:0;
  width:55%; height:100%;
  clip-path: polygon(100% 0, 0 50%, 100% 100%);
  background: linear-gradient(to left, #500f1c, #430b16);
  z-index: 3;
}
.env-bottom {
  position: absolute; bottom:0; left:0; right:0;
  height:65%;
  clip-path: polygon(0 100%, 50% 0, 100% 100%);
  background: linear-gradient(to top, #5e1322, #4c0e19);
  z-index: 4;
}

.env-flap {
  position: absolute; top:0; left:0; right:0;
  height:60%;
  transform-origin: top center;
  transform-style: preserve-3d;
  transition: transform 0.8s cubic-bezier(0.4,0,0.2,1);
  z-index: 20;
}
.env-flap-face {
  position: absolute; inset:0;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  background: linear-gradient(to bottom, #691526, #4f0e1a);
}

/* ── Rose Wax Seal ── */
.seal {
  position: absolute;
  left:50%; top:50%;
  transform: translate(-50%, -50%);
  width:70px; height:70px;
  z-index: 25;
  transition: opacity 0.3s, transform 0.3s;
  filter: drop-shadow(0 4px 14px rgba(0,0,0,0.7));
}
.seal:hover { transform: translate(-50%, -52%) scale(1.06); }
.env-open .seal { opacity:0; pointer-events:none; }
.env-open .env-flap { transform: rotateX(-180deg); z-index:1; }

.hint {
  margin-top: 30px;
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.4em;
  color: #c9922277;
  transition: opacity 0.4s;
}
.hint.hidden { opacity:0; }

/* ══ CARD ══ */
#card {
  position: absolute;
  width: 340px;
  left: 50%;
  top: 15px;
  transform: translateX(-50%) translateY(0);
  opacity: 0;
  z-index: 10;
  pointer-events: none;
  transition: transform 1s cubic-bezier(0.22,1,0.36,1) 0.6s, opacity 0.5s ease 0.6s;
}
#card.risen {
  transform: translateX(-50%) translateY(-390px);
  opacity: 1;
  pointer-events: auto;
}
.card-inner {
  border-radius: 3px;
  overflow: hidden;
  box-shadow: 0 0 0 1px #c9922244, 0 24px 70px rgba(0,0,0,0.9);
}
.card-art { display:block; width:100%; }
</style>
</head>

<script>
(function(){
  const c = document.getElementById('stars');
  for (let i = 0; i < 45; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random()*2+0.5;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*3+2).toFixed(1)}s;--delay:-${(Math.random()*4).toFixed(1)}s;--lo:${(Math.random()*0.1).toFixed(2)};--hi:${(Math.random()*0.4+0.2).toFixed(2)};`;
    c.appendChild(s);
  }
})();

function openEnvelope() {
  const wrap = document.getElementById('envelope-wrap');
  const card = document.getElementById('card');
  const hint = document.getElementById('hint');
  if (wrap.classList.contains('env-open')) return;
  wrap.classList.add('env-open');
  hint.classList.add('hidden');
  // After flap opens, show card rising up then hide envelope
  setTimeout(() => {
    card.classList.add('risen');
  }, 400);
  setTimeout(() => {
    wrap.style.visibility = 'hidden';
  }, 1400);
}
</script>
